services:
  jobsearch:
    build:
      context: .
    env_file:
      - .env
    environment:
      GOOGLE_SERVICE_ACCOUNT_FILE: /var/secrets/google/application_default_credentials.json
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://host.docker.internal:6379/0}
    volumes:
      - ${GOOGLE_ADC_FILE:?Set GOOGLE_ADC_FILE to your local ADC JSON path}:/var/secrets/google/application_default_credentials.json:ro
    command: ["--workflow", "${JOBSEARCH_WORKFLOW:-daily}"]
